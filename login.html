<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Grumfy Cookies</title>
    <link rel="icon" type="image/png" href="Copy%20of%20Grumfy%20Isotype%20style%202.png">
    <link rel="apple-touch-icon" href="Copy%20of%20Grumfy%20Isotype%20style%202.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">
    <main class="auth-layout">
        <div class="auth-card">
            <p class="eyebrow">Grumfy Cookies</p>
            <h1>Iniciar sesión</h1>
            <form id="login-form">
                <label class="email-lock-label">Mail institucional</label>
                <p class="auth-email-display" id="login-email"></p>
                <label class="auth-label" for="login-password">Contraseña</label>
                <input id="login-password" type="password" required minlength="6" placeholder="••••••••">
                <p class="auth-error" id="login-error" aria-live="polite"></p>
                <button class="button primary auth-submit" id="login-submit" type="submit">Entrar</button>
            </form>
            <p class="auth-alt-link"><a href="/">Volver</a></p>
        </div>
    </main>

    <script type="module" src="/src/login-page.ts"></script>
</body>

</html>
